<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>貸出一覧 | Zosyo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-success mb-4">
      <div class="container">
        <a class="navbar-brand" th:href="@{/books}">📚 Zosyo</a>
        <span class="text-white navbar-subtitle">社内蔵書管理システム</span>
        <form th:action="@{/logout}" method="post" class="d-inline ms-auto">
          <button type="submit" class="btn btn-outline-light btn-sm">
            ログアウト
          </button>
        </form>
      </div>
    </nav>

    <div class="container">
      <!-- フラッシュメッセージ -->
      <div
        th:if="${successMessage}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${successMessage}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      <div
        th:if="${errorMessage}"
        class="alert alert-danger alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${errorMessage}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="card-title mb-0">
              貸出一覧
              <span
                class="badge bg-secondary ms-2"
                th:text="${loans.size()} + '件'"
              ></span>
            </h5>
            <a th:href="@{/books}" class="btn btn-outline-secondary btn-sm">
              蔵書一覧へ戻る
            </a>
          </div>

          <!-- 貸出なし -->
          <div th:if="${loans.isEmpty()}" class="text-center text-muted py-4">
            <p>現在貸出中の書籍はありません。</p>
          </div>

          <!-- 貸出テーブル -->
          <div th:if="${!loans.isEmpty()}" class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>書籍タイトル</th>
                  <th>貸出者</th>
                  <th>貸出日</th>
                  <th>返却期限</th>
                  <th class="text-center">状態</th>
                  <th class="text-center">操作</th>
                </tr>
              </thead>
          <tbody>
            <tr th:each="loan : ${loans}">
              <td th:text="${loan.book.title}"></td>
              <td th:text="${loan.borrowerName}"></td>
              <td th:text="${#temporals.format(loan.loanedAt, 'yyyy/MM/dd')}"></td>
              <td>
              <span
                th:classappend="${loan.returnDate == null and loan.dueDate.isBefore(#temporals.createToday())} ? 'text-danger fw-bold'"
                th:text="${#temporals.format(loan.dueDate, 'yyyy/MM/dd')}"
                ></span>
                  </td>
                  <td class="text-center">
                    <!-- 返却済み -->
                    <span th:if="${loan.returnDate != null}" class="badge bg-secondary">返却済み</span>
                    <!-- 未返却・期限切れ -->
                    <span th:if="${loan.returnDate == null and loan.dueDate.isBefore(#temporals.createToday())}" class="badge bg-danger">期限切れ</span>
                    <!-- 未返却・貸出中 -->
                    <span th:if="${loan.returnDate == null and !loan.dueDate.isBefore(#temporals.createToday())}" class="badge bg-success">貸出中</span>
                  </td>
                  <td class="text-center">
                    <!-- 返却済みなら返却ボタンを隠す処理 -->
                    <form
                      th:if="${loan.returnDate == null}"
                      th:action="@{/loans/{id}/return(id=${loan.id})}"
                      method="post"
                      class="d-inline"
                      onsubmit="return confirm('返却処理をしますか？');"
                    >
                    <button type="submit" class="btn btn-sm btn-outline-primary">返却</button>
                    </form>
                    <span th:if="${loan.returnDate != null}" class="text-muted small">
                    <span th:text="${#temporals.format(loan.returnDate, 'yyyy/MM/dd')}"></span> 返却済み
                    </span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
