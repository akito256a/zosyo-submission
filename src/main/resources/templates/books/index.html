<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蔵書一覧 | Zosyo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body class="bg-light">
    <!-- ナビゲーションバー -->
    <nav class="navbar navbar-dark bg-success mb-4">
      <div class="container">
        <a class="navbar-brand" th:href="@{/books}">📚 Zosyo</a>
        <span class="text-white navbar-subtitle">社内蔵書管理システム</span>
        <a th:href="@{/loans}" class="btn btn-outline-light btn-sm ms-auto">
          貸出一覧
        </a>
        <form th:action="@{/logout}" method="post" class="d-inline ms-2">
          <button type="submit" class="btn btn-outline-light btn-sm">
            ログアウト
          </button>
        </form>
      </div>
    </nav>

    <div class="container">
    <!-- フラッシュメッセージ(成功の場合) -->
    <div
      th:if="${successMessage}"
      class="alert alert-success alert-dismissible fade show"
      role="alert"
    >
    <span th:text="${successMessage}"></span>
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="alert"
    ></button>
    </div>

<!-- フラッシュメッセージ(失敗の場合) -->
    <div
      th:if="${errorMessage}"
      class="alert alert-danger alert-dismissible fade show"
      role="alert"
    >
    <span th:text="${errorMessage}"></span>
    <button
      type="button"
      class="btn-close"
      data-bs-dismiss="alert"
    ></button>
    </div>

      <!-- 検索フォーム -->
      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title mb-3">🔍 蔵書検索</h5>
          <form th:action="@{/books}" method="get">
            <div class="row g-2">
              <div class="col-md-5">
                <input
                  type="text"
                  class="form-control"
                  name="title"
                  placeholder="タイトルで検索"
                  th:value="${searchTitle}"
                />
              </div>
              <div class="col-md-4">
                <select class="form-select" name="category">
                  <option value="">カテゴリ（すべて）</option>
                  <option
                    th:each="cat : ${categories}"
                    th:value="${cat}"
                    th:text="${cat}"
                    th:selected="${cat == searchCategory}"
                  ></option>
                </select>
              </div>
              <div class="col-md-3">
                <button type="submit" class="btn btn-success w-100">
                  検索
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- 蔵書一覧テーブル -->
      <div class="card">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="card-title mb-0">
              📖 蔵書一覧
              <span
                class="badge bg-secondary ms-2"
                th:text="${books.size()} + '件'"
              ></span>
            </h5>
            <a th:href="@{/books/new}" class="btn btn-success"> ＋ 新規登録 </a>
          </div>

          <!-- 検索結果なし -->
          <div th:if="${books.isEmpty()}" class="text-center text-muted py-4">
            <p>蔵書が見つかりませんでした。</p>
          </div>

          <!-- テーブル -->
          <div th:if="${!books.isEmpty()}" class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>タイトル</th>
                  <th>著者</th>
                  <th>カテゴリ</th>
                  <th class="text-center">所有数</th>
                  <th class="text-center">在庫数</th>
                  <th class="text-center">操作</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="book : ${books}">
                  <td th:text="${book.title}"></td>
                  <td th:text="${book.author}"></td>
                  <td>
                    <span
                      class="badge bg-secondary"
                      th:text="${book.category}"
                    ></span>
                  </td>
                  <td class="text-center" th:text="${book.quantity}"></td>
                  <td class="text-center">
                    <span
                      th:classappend="${book.stock > 0} ? 'badge-stock-ok' : 'badge-stock-ng'"
                      class="badge"
                      th:text="${book.stock}"
                    ></span>
                  </td>
                  <td class="text-center">
                    <!-- 在庫ありのときだけ貸出ボタンを活性化 -->
                    <a
                      th:href="@{/loans/new(bookId=${book.id})}"
                      class="btn btn-sm btn-outline-success"
                      th:classappend="${book.stock == 0} ? ' disabled'"
                      >貸出</a
                    >
                    <a
                      th:href="@{/books/{id}/edit(id=${book.id})}"
                      class="btn btn-sm btn-outline-primary"
                      >編集</a
                    >
                    <form
                      th:action="@{/books/{id}/delete(id=${book.id})}"
                      method="post"
                      class="d-inline"
                      onsubmit="return confirm('削除しますか？');"
                    >
                      <button
                        type="submit"
                        class="btn btn-sm btn-outline-danger"
                      >
                        削除
                      </button>
                    </form>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
