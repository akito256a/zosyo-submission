<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title
      th:text="${book.id} ? '蔵書編集 | Zosyo' : '蔵書登録 | Zosyo'"
    ></title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body class="bg-light">
    <!-- ナビゲーションバー -->
    <nav class="navbar navbar-dark bg-success mb-4">
      <div class="container">
        <a class="navbar-brand" th:href="@{/books}">📚 Zosyo</a>
        <span class="text-white">社内蔵書管理システム</span>
        <form th:action="@{/logout}" method="post" class="d-inline ms-auto">
          <button type="submit" class="btn btn-outline-light btn-sm">
            ログアウト
          </button>
        </form>
      </div>
    </nav>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <div class="card-body">
              <!-- タイトル -->
              <h5
                class="card-title mb-4"
                th:text="${book.id} ? '✏️ 蔵書編集' : '➕ 蔵書登録'"
              ></h5>

              <!-- フォーム -->
              <form
                th:action="${book.id} ? @{/books/{id}/update(id=${book.id})} : @{/books}"
                th:object="${book}"
                method="post"
              >
                <!-- タイトル -->
                <div class="mb-3">
                  <label class="form-label fw-bold">
                    タイトル <span class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                    th:field="*{title}"
                    placeholder="例：Clean Code"
                  />
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('title')}"
                    th:errors="*{title}"
                  ></div>
                </div>

                <!-- 著者 -->
                <div class="mb-3">
                  <label class="form-label fw-bold">著者</label>
                  <input
                    type="text"
                    class="form-control"
                    th:field="*{author}"
                    placeholder="例：Robert C. Martin"
                  />
                </div>

                <!-- カテゴリ -->
                <div class="mb-3">
                  <label class="form-label fw-bold">カテゴリ</label>
                  <input
                    type="text"
                    class="form-control"
                    th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'"
                    th:field="*{category}"
                    placeholder="例：技術書・ビジネス・自己啓発"
                    list="categoryList"
                  />
                  <datalist id="categoryList">
                    <option
                      th:each="cat : ${categories}"
                      th:value="${cat}"
                    ></option>
                  </datalist>
                  <div
                    class="invalid-feedback"
                    th:if="${#fields.hasErrors('category')}"
                    th:errors="*{category}"
                  ></div>
                </div>

                <!-- 所有冊数・在庫数 -->
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label class="form-label fw-bold">所有冊数</label>
                    <input
                      type="number"
                      class="form-control"
                      th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"
                      th:field="*{quantity}"
                      min="0"
                    />
                    <div
                      class="invalid-feedback"
                      th:if="${#fields.hasErrors('quantity')}"
                      th:errors="*{quantity}"
                    ></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-bold">在庫数</label>
                    <input
                      type="number"
                      class="form-control"
                      th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'"
                      th:field="*{stock}"
                      min="0"
                    />
                    <div
                      class="invalid-feedback"
                      th:if="${#fields.hasErrors('stock')}"
                      th:errors="*{stock}"
                    ></div>
                  </div>
                </div>

                <!-- 備考 -->
                <div class="mb-4">
                  <label class="form-label fw-bold">備考</label>
                  <textarea
                    class="form-control"
                    th:field="*{note}"
                    rows="3"
                    placeholder="自由記入欄"
                  ></textarea>
                </div>

                <!-- ボタン -->
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-success">
                    <span th:text="${book.id} ? '更新する' : '登録する'"></span>
                  </button>
                  <a th:href="@{/books}" class="btn btn-outline-secondary">
                    キャンセル
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
