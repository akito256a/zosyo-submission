<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>ログイン | Zosyo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-light">
    <div class="container">
      <div class="row justify-content-center mt-5">
        <div class="col-md-4">
          <div class="text-center mb-4">
            <h1 class="h3">📚 Zosyo</h1>
            <p class="text-muted">社内蔵書管理システム</p>
          </div>

          <div class="card shadow-sm">
            <div class="card-body p-4">
              <div
                th:if="${param.error}"
                class="alert alert-danger"
                role="alert"
              >
                ユーザー名またはパスワードが正しくありません。
              </div>

              <div
                th:if="${param.logout}"
                class="alert alert-success"
                role="alert"
              >
                ログアウトしました。
              </div>

              <form th:action="@{/login}" method="post">
                <div class="mb-3">
                  <label for="username" class="form-label">ユーザー名</label>
                  <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    required
                    autofocus
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">パスワード</label>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    required
                  />
                </div>
                <div class="d-grid">
                  <button type="submit" class="btn btn-primary">
                    ログイン
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
