services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: zosyo_db
      PGUSER: zosyo_user
      PGPASSWORD: zosyo_pass
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: zosyo_db
      POSTGRES_USER: zosyo_user
      POSTGRES_PASSWORD: zosyo_pass
    ports:
      - "5432:5432"
    volumes:
      - zosyo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zosyo_user -d zosyo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  zosyo_pgdata: